<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Showreel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="showreel.css">
</head>
<body>

  <canvas id="grain"></canvas>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <!-- Navigation -->
  <a class="nav-back" href="/Website/index.html"> ← Back </a>
  <span class="nav-label">Showreel</span>

  <!-- Central player -->
  <main>

    <div class="player-wrap" id="playerWrap">

      <!-- Video element -->
      <video
        id="showreel"
        src="Showreel_Maullick.mp4"
        preload="metadata"
        playsinline
      ></video>

      <!-- Play / pause overlay -->
      <button class="play-overlay" id="playOverlay" aria-label="Play">
        <svg class="play-icon" id="playIcon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="6,3 20,12 6,21" fill="currentColor"/>
        </svg>
        <svg class="pause-icon" id="pauseIcon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:none">
          <rect x="5"  y="3" width="4" height="18" fill="currentColor"/>
          <rect x="15" y="3" width="4" height="18" fill="currentColor"/>
        </svg>
      </button>

      <!-- Caption track — bottom of video -->
      <div class="caption-track" id="captionTrack">
        <span class="caption-text" id="captionText"></span>
      </div>

      <!-- Progress bar -->
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>

    </div>

    <!-- Controls row below player -->
    <div class="controls">
      <span class="time" id="timeCurrent">0:00</span>

      <button class="ctrl-btn" id="muteBtn" aria-label="Mute">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path id="volumePath"
            d="M11 5L6 9H2v6h4l5 4V5z M15.54 8.46a5 5 0 0 1 0 7.07"
            stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </button>

      <button class="ctrl-btn" id="fullscreenBtn" aria-label="Fullscreen">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
            stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <span class="time time-right" id="timeDuration">0:00</span>
    </div>

    <!-- Static caption list — below controls -->
    <div class="caption-list" id="captionList"></div>

  </main>

  <script src="showreel.js"></script>
</body>
</html>
