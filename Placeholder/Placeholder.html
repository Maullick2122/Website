<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Under Construction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-display: 'rockwell', 'Cormorant Garamond', serif;
      --font-ui:      'futura', 'DM Mono', monospace;
      --ink:          #1c1a16;
      --paper:        #f7f5f0;
      --muted:        rgba(28,26,22,0.32);
      --faint:        rgba(28,26,22,0.1);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--paper);
      overflow: hidden;
      cursor: none;
      border: 2.5px solid #000;
      min-height: 100vh;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1.5rem, 4vh, 3rem);
    }

    /* ── Grain ──────────────────────────────────────────────────── */
    canvas#grain {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      opacity: 0.028;
      z-index: 0;
    }

    /* ── Cursor ─────────────────────────────────────────────────── */
    #cursor {
      position: fixed;
      left: 50vw; top: 50vh;
      width: 8px; height: 8px;
      background: #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      mix-blend-mode: difference;
    }
    #cursor-ring {
      position: fixed;
      left: 50vw; top: 50vh;
      width: 32px; height: 32px;
      border: 0.8px solid #fff;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%,-50%);
      mix-blend-mode: difference;
    }

    /* ── Nav ────────────────────────────────────────────────────── */
    .nav-back {
      position: fixed;
      top: clamp(1.2rem, 3vh, 2rem);
      left: clamp(1.5rem, 3vw, 2.5rem);
      font-family: var(--font-ui);
      font-size: clamp(0.42rem, 0.72vw, 0.52rem);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-decoration: none;
      text-transform: uppercase;
      border-bottom: 0.5px solid var(--faint);
      padding-bottom: 2px;
      z-index: 100;
      cursor: none;
      transition: color 0.2s, border-color 0.2s;
    }
    .nav-back:hover { color: var(--ink); border-color: rgba(28,26,22,0.4); }

    .page-label {
      position: fixed;
      top: clamp(1.2rem, 3vh, 2rem);
      right: clamp(1.5rem, 4vw, 3rem);
      font-family: var(--font-ui);
      font-size: clamp(0.42rem, 0.72vw, 0.52rem);
      font-weight: 300;
      color: rgba(28,26,22,0.18);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 100;
    }

    /* ── Progress dot row ───────────────────────────────────────── */
    .progress-dots {
      position: fixed;
      bottom: clamp(1.2rem, 3vh, 2rem);
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      align-items: center;
      pointer-events: none;
      z-index: 100;
    }

    .progress-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: rgba(28,26,22,0.15);
    }
    .progress-dot.active {
      background: rgba(28,26,22,0.55);
    }

    /* ── Main content ───────────────────────────────────────────── */
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1.2rem, 3vh, 2rem);
    }

    /* ── Construction SVG ───────────────────────────────────────── */
    .construction-svg {
      width: clamp(240px, 40vmin, 480px);
      height: auto;
    }

    /* All strokes drawn via dasharray animation */
    .draw {
      stroke-dasharray: var(--len, 400);
      stroke-dashoffset: var(--len, 400);
      animation: draw var(--dur, 1.2s) var(--delay, 0s) cubic-bezier(0.4,0,0.2,1) forwards;
    }
    @keyframes draw {
      to { stroke-dashoffset: 0; }
    }

    /* Blink cursor at end of last line */
    .cursor-blink {
      animation: blink 1s 3.5s step-end infinite;
      opacity: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50%       { opacity: 1; }
    }

    /* Floating dot that orbits the top of the structure */
    .orbit-dot {
      animation: orbit 4s 3.8s linear infinite;
      transform-origin: 200px 210px;
      opacity: 0;
      animation-fill-mode: forwards;
    }
    @keyframes orbit {
      0%   { opacity:1; transform: rotate(0deg)   translateX(42px); }
      100% { opacity:1; transform: rotate(360deg) translateX(42px); }
    }

    /* ── Labels ─────────────────────────────────────────────────── */
    .label-primary {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 4vmin, 2.8rem);
      font-weight: 300;
      color: var(--ink);
      letter-spacing: 0.04em;
      line-height: 1;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s 3.2s ease forwards;
    }

    .label-sub {
      font-family: var(--font-ui);
      font-size: clamp(0.44rem, 0.85vw, 0.6rem);
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.8s 3.6s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* ── Scaffold tick counter ──────────────────────────────────── */
    .ticker {
      font-family: var(--font-ui);
      font-size: clamp(0.38rem, 0.65vw, 0.48rem);
      font-weight: 300;
      color: rgba(28,26,22,0.2);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0;
      animation: fadeUp 0.6s 4s ease forwards;
    }
  </style>
</head>
<body>

  <canvas id="grain"></canvas>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <a class="nav-back" href="/Website/index.html">← Back</a>
  <span class="page-label">In Progress</span>

  <div class="progress-dots">
    <div class="progress-dot active" id="dot0"></div>
    <div class="progress-dot" id="dot1"></div>
    <div class="progress-dot" id="dot2"></div>
    <div class="progress-dot" id="dot3"></div>
    <div class="progress-dot" id="dot4"></div>
  </div>

  <div class="content">

    <!--
      CONSTRUCTION SVG — an architectural elevation being drafted line by line.
      Each element uses stroke-dasharray animation to "draw itself in".
      stroke-dasharray = approx path length; adjust --len if lines look wrong.
    -->
    <svg
      class="construction-svg"
      viewBox="0 0 400 320"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      aria-label="An architectural structure being drawn"
    >

      <!-- Ground line -->
      <line class="draw" style="--len:400;--dur:0.9s;--delay:0.1s"
        x1="20" y1="280" x2="380" y2="280"
        stroke="rgba(28,26,22,0.25)" stroke-width="0.8"/>

      <!-- Left foundation block -->
      <rect class="draw" style="--len:200;--dur:0.6s;--delay:0.8s"
        x="40" y="260" width="60" height="20"
        stroke="rgba(28,26,22,0.4)" stroke-width="0.8"/>

      <!-- Right foundation block -->
      <rect class="draw" style="--len:200;--dur:0.6s;--delay:0.9s"
        x="300" y="260" width="60" height="20"
        stroke="rgba(28,26,22,0.4)" stroke-width="0.8"/>

      <!-- Left column -->
      <line class="draw" style="--len:240;--dur:0.7s;--delay:1.3s"
        x1="70" y1="260" x2="70" y2="100"
        stroke="rgba(28,26,22,0.6)" stroke-width="1"/>

      <!-- Right column -->
      <line class="draw" style="--len:240;--dur:0.7s;--delay:1.5s"
        x1="330" y1="260" x2="330" y2="100"
        stroke="rgba(28,26,22,0.6)" stroke-width="1"/>

      <!-- Left column cap -->
      <line class="draw" style="--len:30;--dur:0.3s;--delay:2s"
        x1="55" y1="100" x2="85" y2="100"
        stroke="rgba(28,26,22,0.5)" stroke-width="0.8"/>

      <!-- Right column cap -->
      <line class="draw" style="--len:30;--dur:0.3s;--delay:2.1s"
        x1="315" y1="100" x2="345" y2="100"
        stroke="rgba(28,26,22,0.5)" stroke-width="0.8"/>

      <!-- Beam across top -->
      <line class="draw" style="--len:280;--dur:0.7s;--delay:2.3s"
        x1="70" y1="100" x2="330" y2="100"
        stroke="rgba(28,26,22,0.55)" stroke-width="1"/>

      <!-- Roof left slope -->
      <line class="draw" style="--len:160;--dur:0.5s;--delay:2.9s"
        x1="70" y1="100" x2="200" y2="30"
        stroke="rgba(28,26,22,0.65)" stroke-width="1.2"/>

      <!-- Roof right slope -->
      <line class="draw" style="--len:160;--dur:0.5s;--delay:3.0s"
        x1="330" y1="100" x2="200" y2="30"
        stroke="rgba(28,26,22,0.65)" stroke-width="1.2"/>

      <!-- Ridge cap -->
      <line class="draw" style="--len:16;--dur:0.25s;--delay:3.4s"
        x1="193" y1="30" x2="207" y2="30"
        stroke="rgba(28,26,22,0.4)" stroke-width="0.8"/>

      <!-- Centre doorway outline -->
      <polyline class="draw" style="--len:220;--dur:0.6s;--delay:2.5s"
        points="165,280 165,190 235,190 235,280"
        stroke="rgba(28,26,22,0.4)" stroke-width="0.8"/>

      <!-- Doorway arch -->
      <path class="draw" style="--len:110;--dur:0.4s;--delay:3.0s"
        d="M165,190 Q200,155 235,190"
        stroke="rgba(28,26,22,0.35)" stroke-width="0.8"/>

      <!-- Left window -->
      <rect class="draw" style="--len:160;--dur:0.5s;--delay:2.6s"
        x="95" y="150" width="50" height="50"
        stroke="rgba(28,26,22,0.35)" stroke-width="0.7"/>

      <!-- Left window cross -->
      <line class="draw" style="--len:60;--dur:0.3s;--delay:3.1s"
        x1="120" y1="150" x2="120" y2="200"
        stroke="rgba(28,26,22,0.2)" stroke-width="0.5"/>
      <line class="draw" style="--len:60;--dur:0.3s;--delay:3.2s"
        x1="95" y1="175" x2="145" y2="175"
        stroke="rgba(28,26,22,0.2)" stroke-width="0.5"/>

      <!-- Right window -->
      <rect class="draw" style="--len:160;--dur:0.5s;--delay:2.7s"
        x="255" y="150" width="50" height="50"
        stroke="rgba(28,26,22,0.35)" stroke-width="0.7"/>

      <!-- Right window cross -->
      <line class="draw" style="--len:60;--dur:0.3s;--delay:3.1s"
        x1="280" y1="150" x2="280" y2="200"
        stroke="rgba(28,26,22,0.2)" stroke-width="0.5"/>
      <line class="draw" style="--len:60;--dur:0.3s;--delay:3.2s"
        x1="255" y1="175" x2="305" y2="175"
        stroke="rgba(28,26,22,0.2)" stroke-width="0.5"/>

      <!-- Scaffold left pole -->
      <line class="draw" style="--len:300;--dur:0.5s;--delay:0.4s"
        x1="20" y1="280" x2="20" y2="30"
        stroke="rgba(28,26,22,0.12)" stroke-width="0.6" stroke-dasharray="4 4"/>

      <!-- Scaffold right pole -->
      <line class="draw" style="--len:300;--dur:0.5s;--delay:0.5s"
        x1="380" y1="280" x2="380" y2="30"
        stroke="rgba(28,26,22,0.12)" stroke-width="0.6" stroke-dasharray="4 4"/>

      <!-- Scaffold horizontal rungs — appear in sequence -->
      <line class="draw" style="--len:20;--dur:0.2s;--delay:1.0s"
        x1="14" y1="240" x2="26" y2="240"
        stroke="rgba(28,26,22,0.18)" stroke-width="0.6"/>
      <line class="draw" style="--len:20;--dur:0.2s;--delay:1.1s"
        x1="374" y1="240" x2="386" y2="240"
        stroke="rgba(28,26,22,0.18)" stroke-width="0.6"/>
      <line class="draw" style="--len:20;--dur:0.2s;--delay:1.2s"
        x1="14" y1="200" x2="26" y2="200"
        stroke="rgba(28,26,22,0.18)" stroke-width="0.6"/>
      <line class="draw" style="--len:20;--dur:0.2s;--delay:1.3s"
        x1="374" y1="200" x2="386" y2="200"
        stroke="rgba(28,26,22,0.18)" stroke-width="0.6"/>
      <line class="draw" style="--len:20;--dur:0.2s;--delay:1.4s"
        x1="14" y1="160" x2="26" y2="160"
        stroke="rgba(28,26,22,0.18)" stroke-width="0.6"/>
      <line class="draw" style="--len:20;--dur:0.2s;--delay:1.5s"
        x1="374" y1="160" x2="386" y2="160"
        stroke="rgba(28,26,22,0.18)" stroke-width="0.6"/>
      <line class="draw" style="--len:20;--dur:0.2s;--delay:1.6s"
        x1="14" y1="120" x2="26" y2="120"
        stroke="rgba(28,26,22,0.18)" stroke-width="0.6"/>
      <line class="draw" style="--len:20;--dur:0.2s;--delay:1.7s"
        x1="374" y1="120" x2="386" y2="120"
        stroke="rgba(28,26,22,0.18)" stroke-width="0.6"/>

      <!-- Dimension line at top with arrows -->
      <line class="draw" style="--len:320;--dur:0.5s;--delay:3.5s"
        x1="70" y1="14" x2="330" y2="14"
        stroke="rgba(28,26,22,0.12)" stroke-width="0.5"/>
      <line class="draw" style="--len:20;--dur:0.2s;--delay:4.0s"
        x1="70" y1="8" x2="70" y2="20"
        stroke="rgba(28,26,22,0.12)" stroke-width="0.5"/>
      <line class="draw" style="--len:20;--dur:0.2s;--delay:4.0s"
        x1="330" y1="8" x2="330" y2="20"
        stroke="rgba(28,26,22,0.12)" stroke-width="0.5"/>

      <!-- Orbiting build dot — a small dot circling the apex -->
      <circle class="orbit-dot" cx="200" cy="30" r="3"
        fill="none" stroke="rgba(28,26,22,0.55)" stroke-width="1"/>

      <!-- Blinking cursor at ridge after drawing complete -->
      <line class="cursor-blink"
        x1="210" y1="24" x2="210" y2="36"
        stroke="rgba(28,26,22,0.6)" stroke-width="1.2" stroke-linecap="round"/>

    </svg>

    <span class="label-primary">Something is being built.</span>
    <span class="label-sub">Check back soon</span>
    <span class="ticker" id="ticker">00:00:00</span>

  </div>

  <script>
    // ── Cursor ──────────────────────────────────────────────────────
    const cur  = document.getElementById("cursor");
    const ring = document.getElementById("cursor-ring");
    let mX = innerWidth/2, mY = innerHeight/2, rX = mX, rY = mY;

    window.addEventListener("mousemove", e => {
      mX = e.clientX; mY = e.clientY;
      cur.style.left = mX + "px"; cur.style.top = mY + "px";
    });

    (function animRing() {
      rX += (mX - rX) * 0.11; rY += (mY - rY) * 0.11;
      ring.style.left = rX + "px"; ring.style.top = rY + "px";
      requestAnimationFrame(animRing);
    })();

    // ── Elapsed time ticker ─────────────────────────────────────────
    const tickerEl = document.getElementById("ticker");
    const start    = Date.now();

    function updateTicker() {
      const elapsed = Math.floor((Date.now() - start) / 1000);
      const h = String(Math.floor(elapsed / 3600)).padStart(2, "0");
      const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, "0");
      const s = String(elapsed % 60).padStart(2, "0");
      tickerEl.textContent = `${h}:${m}:${s}`;
      requestAnimationFrame(updateTicker);
    }
    requestAnimationFrame(updateTicker);

    // ── Progress dots animate through with the drawing ──────────────
    const dots      = [0,1,2,3,4].map(i => document.getElementById("dot" + i));
    const dotTimes  = [0, 900, 1800, 2800, 3600]; // ms

    dotTimes.forEach((t, i) => {
      setTimeout(() => {
        dots.forEach(d => d.classList.remove("active"));
        dots[i].classList.add("active");
      }, t);
    });

    // ── Film grain ──────────────────────────────────────────────────
    const gc  = document.getElementById("grain");
    const gx  = gc.getContext("2d");
    let gf = 0;

    function resizeGrain() { gc.width = innerWidth; gc.height = innerHeight; }
    resizeGrain();
    window.addEventListener("resize", resizeGrain);

    (function drawGrain() {
      if (++gf % 3 === 0) {
        const id = gx.createImageData(gc.width, gc.height);
        for (let i = 0; i < id.data.length; i += 4) {
          const v = Math.random() * 255 | 0;
          id.data[i] = id.data[i+1] = id.data[i+2] = v; id.data[i+3] = 255;
        }
        gx.putImageData(id, 0, 0);
      }
      requestAnimationFrame(drawGrain);
    })();
  </script>

</body>
</html>
